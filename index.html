<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>คำนวณแคลอรี่ (BMR & TDEE)</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
    }

    .container {
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 0 15px rgba(0,0,0,0.1);
        width: 350px;
    }

    h2 {
        text-align: center;
        color: #333;
    }

    label {
        display: block;
        margin-top: 10px;
    }

    input, select {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        box-sizing: border-box;
    }

    button {
        width: 100%;
        padding: 10px;
        margin-top: 15px;
        background: #28a745;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
    }

    button:hover {
        background: #218838;
    }

    .result {
        margin-top: 20px;
        padding: 10px;
        background: #f8f9fa;
        border-radius: 6px;
    }
</style>
</head>
<body>

<div class="container">
    <h2>คำนวณแคลอรี่</h2>

    <label>น้ำหนัก (kg)</label>
    <input type="number" id="weight">

    <label>ส่วนสูง (cm)</label>
    <input type="number" id="height">

    <label>อายุ</label>
    <input type="number" id="age">

    <label>เพศ</label>
    <select id="gender">
        <option value="male">ชาย</option>
        <option value="female">หญิง</option>
    </select>

    <label>ระดับกิจกรรม</label>
    <select id="activity">
        <option value="1.2">ไม่ออกกำลังกาย</option>
        <option value="1.375">ออกกำลังกาย 1-3 วัน/สัปดาห์</option>
        <option value="1.55">ออกกำลังกาย 3-5 วัน/สัปดาห์</option>
        <option value="1.725">ออกกำลังกาย 6-7 วัน/สัปดาห์</option>
        <option value="1.9">ออกกำลังกายหนักมาก</option>
    </select>

    <button onclick="calculateCalories()">คำนวณ</button>

    <div class="result" id="result"></div>
</div>

<script>
function calculateCalories() {
    let weight = parseFloat(document.getElementById("weight").value);
    let height = parseFloat(document.getElementById("height").value);
    let age = parseInt(document.getElementById("age").value);
    let gender = document.getElementById("gender").value;
    let activity = parseFloat(document.getElementById("activity").value);

    if (!weight || !height || !age) {
        alert("กรุณากรอกข้อมูลให้ครบ");
        return;
    }

    let bmr;

    if (gender === "male") {
        bmr = (10 * weight) + (6.25 * height) - (5 * age) + 5;
    } else {
        bmr = (10 * weight) + (6.25 * height) - (5 * age) - 161;
    }

    let tdee = bmr * activity;

    document.getElementById("result").innerHTML = `
        <h3>ผลลัพธ์</h3>
        <p><strong>BMR:</strong> ${bmr.toFixed(2)} kcal/วัน</p>
        <p><strong>TDEE:</strong> ${tdee.toFixed(2)} kcal/วัน</p>
    `;
}
</script>

</body>
</html>
